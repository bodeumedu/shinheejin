<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solapi 카카오톡 발송 테스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result.show {
            display: block;
        }

        .result pre {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-box h3 {
            margin-bottom: 8px;
            color: #1976D2;
            font-size: 16px;
        }

        .info-box p {
            color: #555;
            font-size: 13px;
            line-height: 1.6;
            margin: 5px 0;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .loading.show {
            display: block;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Solapi 카카오톡 발송 테스트</h1>

        <div class="info-box">
            <h3>ℹ️ 사용 방법</h3>
            <p>1. 전화번호, 템플릿 코드, 변수 등을 입력합니다.</p>
            <p>2. "카카오톡 발송 테스트" 버튼을 클릭합니다.</p>
            <p>3. 결과를 확인하여 API 키 설정 및 요청 형식을 검증합니다.</p>
        </div>

        <form id="testForm">
            <div class="section">
                <div class="section-title">기본 정보</div>
                
                <div class="form-group">
                    <label for="phoneNumber">📞 수신 전화번호 (필수)</label>
                    <input 
                        type="tel" 
                        id="phoneNumber" 
                        placeholder="01012345678 (하이픈 없이)"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="templateCode">📝 템플릿 코드 (필수)</label>
                    <input 
                        type="text" 
                        id="templateCode" 
                        placeholder="KA01TP251128032646018yKogg613GWY"
                        required
                    >
                </div>
            </div>

            <div class="section">
                <div class="section-title">템플릿 변수</div>
                
                <div class="form-group">
                    <label for="title">📌 과제제목 (#{과제제목})</label>
                    <input 
                        type="text" 
                        id="title" 
                        placeholder="과천중앙고등학교 1학년 일요일반 과제 진행상황"
                        value="테스트 과제 진행상황"
                    >
                </div>

                <div class="form-group">
                    <label for="content">📄 과제내용 (#{과제내용})</label>
                    <textarea 
                        id="content" 
                        placeholder="과제 내용을 입력하세요..."
                    >테스트 내용입니다.

👤 테스트 학생

✅ 테스트 항목: 완료</textarea>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                🚀 카카오톡 발송 테스트
            </button>
        </form>

        <div class="loading" id="loading">전송 중</div>

        <div class="result" id="result">
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('testForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const resultContent = document.getElementById('resultContent');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 입력값 가져오기
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const templateCode = document.getElementById('templateCode').value.trim();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();

            // 유효성 검증
            if (!phoneNumber || !templateCode) {
                showResult('error', '전화번호와 템플릿 코드는 필수입니다.');
                return;
            }

            // 전화번호 형식 검증
            const phoneRegex = /^01[0-9]{1}[0-9]{7,8}$/;
            const cleanPhone = phoneNumber.replace(/-/g, '');
            if (!phoneRegex.test(cleanPhone)) {
                showResult('error', `유효하지 않은 전화번호 형식입니다: ${phoneNumber}`);
                return;
            }

            // UI 업데이트
            submitBtn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');

            try {
                // API URL 설정
                const apiUrl = window.location.origin + '/api/send-kakao';

                console.log('📤 요청 시작:', {
                    apiUrl,
                    phoneNumber: cleanPhone,
                    templateCode
                });

                // API 요청
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        phoneNumber: cleanPhone,
                        templateCode: templateCode,
                        variables: {
                            '과제제목': title || '테스트 과제 진행상황',
                            '과제내용': content || '테스트 내용입니다.',
                        },
                    }),
                });

                console.log('📥 응답 상태:', response.status, response.statusText);

                // 응답 본문 읽기
                const responseText = await response.text();
                console.log('📥 응답 본문:', responseText);

                let responseData;
                try {
                    responseData = JSON.parse(responseText);
                } catch (parseError) {
                    throw new Error(`서버 응답 파싱 실패: ${responseText.substring(0, 200)}`);
                }

                if (response.ok && responseData.success) {
                    showResult('success', 
                        '✅ 카카오톡 발송 성공!\n\n' +
                        `전화번호: ${cleanPhone}\n` +
                        `템플릿 코드: ${templateCode}\n\n` +
                        '응답 데이터:\n' +
                        JSON.stringify(responseData, null, 2)
                    );
                } else {
                    const errorMsg = responseData.error || responseData.message || '알 수 없는 오류';
                    showResult('error', 
                        `❌ 카카오톡 발송 실패!\n\n` +
                        `HTTP 상태: ${response.status} ${response.statusText}\n` +
                        `오류 메시지: ${errorMsg}\n\n` +
                        `상세 응답:\n` +
                        JSON.stringify(responseData, null, 2)
                    );
                }

            } catch (error) {
                console.error('❌ 오류 발생:', error);
                showResult('error', 
                    `❌ 요청 중 오류 발생!\n\n` +
                    `오류: ${error.message}\n\n` +
                    `스택:\n${error.stack || '없음'}`
                );
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('show');
            }
        });

        function showResult(type, message) {
            result.className = `result ${type} show`;
            resultContent.innerHTML = `<pre>${escapeHtml(message)}</pre>`;
            result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 페이지 로드 시 기본값 설정 (URL 파라미터에서)
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('phone')) {
                document.getElementById('phoneNumber').value = params.get('phone');
            }
            if (params.get('template')) {
                document.getElementById('templateCode').value = params.get('template');
            }
        });
    </script>
</body>
</html>
